<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flores Amarillas Para Ti</title>
  <meta name="description" content="Un detalle con flores amarillas hecho con amor." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="sky"></div>
  <div class="moon" aria-hidden="true"></div>
  <div class="petals" aria-hidden="true">
    <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
    <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
    <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
  </div>
  <main class="scene">
    <section class="content">
      <p class="tag">Para ti, mi amor</p>
      <h1>Estas flores amarillas son para ti</h1>
      <p class="message">
        Gracias por existir, por tu sonrisa y por hacer mis dias mas bonitos.
        Te mando este detalle para recordarte cuanto te quiero.
      </p>

      <button id="surpriseBtn" class="btn">Haz clic para una sorpresa</button>
      <p id="loveLine" class="love-line" hidden>
        Eres mi persona favorita. Te amo mucho.
      </p>

      <audio id="music" loop controls>
        <source src="flores_amarillas_floricienta.mp3" type="audio/mpeg" />
        Tu navegador no soporta audio.
      </audio>
    </section>

    <section class="bouquet" aria-label="Ramo de flores amarillas">
      <div class="flower flower--1"><span class="stem"></span><span class="bloom"></span><span class="center"></span><span class="leaf left"></span><span class="leaf right"></span></div>
      <div class="flower flower--2"><span class="stem"></span><span class="bloom"></span><span class="center"></span><span class="leaf left"></span><span class="leaf right"></span></div>
      <div class="flower flower--3"><span class="stem"></span><span class="bloom"></span><span class="center"></span><span class="leaf left"></span><span class="leaf right"></span></div>
      <div class="flower flower--4"><span class="stem"></span><span class="bloom"></span><span class="center"></span><span class="leaf left"></span><span class="leaf right"></span></div>
      <div class="flower flower--5"><span class="stem"></span><span class="bloom"></span><span class="center"></span><span class="leaf left"></span><span class="leaf right"></span></div>
      <div class="flower flower--6"><span class="stem"></span><span class="bloom"></span><span class="center"></span><span class="leaf left"></span><span class="leaf right"></span></div>
      <div class="flower flower--7"><span class="stem"></span><span class="bloom"></span><span class="center"></span><span class="leaf left"></span><span class="leaf right"></span></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
